<!DOCTYPE html>
<html>
<head>
    <title>Exer3Table</title>
</head>
<body>

    <table border="1" width="900" cellspacing="0" cellpadding="10">
        
      
        <tr>
            <th colspan="4" align="center">
                <h2>Merging Table</h2>
            </th>
        </tr>

      
        <tr>
         
            <td rowspan="3" align="center" width="250">A</td>

          
            <td align="center">B</td>
            <td align="center">C</td>

            
            <td rowspan="3" align="center" width="200">G</td>
        </tr>

   
        <tr>
            <td colspan="2" align="center">D</td>
        </tr>

      
        <tr>
            <td align="center">E</td>
            <td align="center">F</td>
        </tr>

 
        <tr>
            <td colspan="4" align="center">H</td>
        </tr>

    </table>

</body>
</html>
