<!DOCTYPE html>
<html>
<head>
    <title>Exercise 3 - Table</title>
</head>
<body>

    <fieldset>
        <legend>
            <h1 style="color:blue;">Request for Proposal</h1>
        </legend>

        <table>

            <tr>
                <td>Your Company:</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Email:</td>
                <td><input type="email"></td>
            </tr>

            <tr>
                <td>Username:</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Password:</td>
                <td><input type="password"></td>
            </tr>

            <tr>
                <td valign="top">Your business:</td>
                <td>
                    <textarea rows="3" cols="24"></textarea>
                </td>
            </tr>

            <tr>
                <td valign="top">Company size:</td>
                <td>
                    <input type="radio" name="size"> less than 10 <br>
                    <input type="radio" name="size"> 10 to 50 <br>
                    <input type="radio" name="size"> 50 to 200 <br>
                    <input type="radio" name="size"> over 200
                </td>
            </tr>

            <tr>
                <td>Services:</td>
                <td>
                    <input type="checkbox"> Brand Identity
                    <input type="checkbox"> New Website
                    <input type="checkbox"> Web Redesign
                </td>
            </tr>

            <tr>
                <td>Timeline:</td>
                <td>
                    <select>
                        <option>Select 1</option>
                        <option>1 Month</option>
                        <option>2 Months</option>
                        <option>3 Months</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Send to dev/design">
                </td>
            </tr>

        </table>
    </fieldset>

</body>
</html>
