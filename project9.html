<!DOCTYPE html>
<html>
<head>
    <title>Finals Task 1</title>

    <style>

        body{
            height:3000px;
            font-family:Arial, sans-serif;
            background:#f2f2f2;
            margin:0;
            padding:20px;
        }

        .close-button{
            position:absolute;
            top:20px;
            right:20px;
            width:50px;
            height:50px;
            border:none;
            border-radius:50%;
            background:black;
            color:white;
            font-size:25px;
            cursor:pointer;
        }

        .fixed-box{
            position:fixed;
            bottom:20px;
            right:20px;
            width:320px;
            height:180px;
            background:#999;
        }

        .container{
            margin-top:100px;
            display:flex;
            gap:100px;
        }

        .product{
            position:relative;
            display:inline-block;
            width:320px;
            background:#d3d3d3;
            padding:15px;
        }

        .product img{
            width:100%;
            height:auto;
            display:block;
        }

        .discount{
            position:absolute;
            top:20px;
            right:20px;
            background:black;
            color:white;
            padding:10px;
            font-size:18px;
        }

        .overlay{
            position:absolute;
            bottom:15px;
            left:0;
            width:100%;
            background:rgba(255,255,255,0.7);
            text-align:center;
            padding:20px 0;
        }

        .overlay button{
            padding:12px 20px;
            border:1px solid black;
            background:white;
            cursor:pointer;
            font-size:16px;
        }

    </style>
</head>

<body>

    <button class="close-button">×</button>

    <div class="fixed-box"></div>

    <div class="container">

        <div class="product">

            <img src="shirt.jpg" alt="shirt">

            <div class="discount">20% OFF</div>

        </div>

        <div class="product">

           <img src="shirt.jpg" alt="shirt">

            <div class="discount">20% OFF</div>

            <div class="overlay">

                <button>Add to Cart</button>

            </div>

        </div>

    </div>

</body>
</html>
